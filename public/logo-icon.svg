<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="100%" height="100%">
  <!-- Background square in deep green -->
  <rect width="160" height="160" rx="12" fill="#0B3826" />
  
  <!-- Mask in Gold -->
  <g fill="none" stroke="#c9a14a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" transform="translate(10, 5) scale(0.88)">
    <!-- Crown -->
    <path d="M 60 40 C 55 15, 105 15, 100 40" />
    <path d="M 48 46 C 48 31, 63 34, 60 40 C 57 46, 45 43, 51 55" />
    <path d="M 112 46 C 112 31, 97 34, 100 40 C 103 46, 115 43, 109 55" />
    <path d="M 60 40 Q 80 55 100 40" />

    <!-- Face Oval -->
    <path d="M 57 60 C 42 90, 42 130, 80 148 C 118 130, 118 90, 103 60 C 97 50, 63 50, 57 60 Z" />

    <!-- V on forehead -->
    <path d="M 72 63 L 80 75 L 88 63" />

    <!-- Eyes -->
    <path d="M 60 90 C 63 80, 75 80, 78 90 C 75 95, 63 95, 60 90 Z" />
    <path d="M 82 90 C 85 80, 97 80, 100 90 C 97 95, 85 95, 82 90 Z" />

    <!-- Nose -->
    <path d="M 80 75 L 80 120 Q 80 125 74 125 M 80 120 Q 80 125 86 125" stroke-width="3" />

    <!-- Mouth -->
    <path d="M 70 133 C 73 127, 87 127, 90 133 Z" />

    <!-- Cheek Dots -->
    <circle cx="67" cy="108" r="1.8" fill="#c9a14a" stroke="none" />
    <circle cx="72" cy="113" r="1.8" fill="#c9a14a" stroke="none" />
    <circle cx="77" cy="108" r="1.8" fill="#c9a14a" stroke="none" />
    
    <circle cx="93" cy="108" r="1.8" fill="#c9a14a" stroke="none" />
    <circle cx="88" cy="113" r="1.8" fill="#c9a14a" stroke="none" />
    <circle cx="83" cy="108" r="1.8" fill="#c9a14a" stroke="none" />

    <!-- Left/Right plant detail -->
    <path d="M 30 115 C 30 90, 42 80, 42 80" />
    <path d="M 30 115 Q 38 110 40 102 M 30 115 Q 24 110 20 102" />

    <path d="M 130 115 C 130 90, 118 80, 118 80" />
    <path d="M 130 115 Q 122 110 120 102 M 130 115 Q 136 110 140 102" />
  </g>

  <!-- Small text below mask inside green box -->
  <text x="80" y="138" font-family="'Times New Roman', 'Fraunces', 'Georgia', serif" font-size="8.5" font-weight="bold" fill="#c9a14a" text-anchor="middle" letter-spacing="0.5">OUR ROOTS</text>
  <text x="80" y="149" font-family="'Times New Roman', 'Fraunces', 'Georgia', serif" font-size="11" font-weight="bold" fill="#c9a14a" text-anchor="middle" letter-spacing="1">AFRICA</text>
</svg>
